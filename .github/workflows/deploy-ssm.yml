name: Deploy to EC2 via AWS SSM (No SSH Required)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Deploy to EC2 via SSM
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -e",
              "echo \"===========================================\"",
              "echo \"🚀 Starting Deployment\"",
              "echo \"===========================================\"",
              "cd /home/ubuntu/mushqila",
              "echo \"📦 Creating backup...\"",
              "sudo cp -r /home/ubuntu/mushqila /home/ubuntu/mushqila_backup_$(date +%Y%m%d_%H%M%S)",
              "echo \"🔄 Pulling latest code...\"",
              "git fetch origin main",
              "git reset --hard origin/main",
              "git pull origin main",
              "echo \"🧹 Cleaning cache...\"",
              "find . -type d -name \"__pycache__\" -exec rm -rf {} + 2>/dev/null || true",
              "find . -type f -name \"*.pyc\" -delete 2>/dev/null || true",
              "echo \"🐳 Building Docker images...\"",
              "docker-compose -f docker-compose.prod.yml build --no-cache web",
              "echo \"🔄 Deploying with zero downtime...\"",
              "docker-compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans",
              "sleep 10",
              "echo \"📊 Running migrations...\"",
              "docker-compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput",
              "echo \"📁 Collecting static files...\"",
              "docker-compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput --clear",
              "echo \"🗑️ Cleaning up...\"",
              "docker system prune -f",
              "echo \"===========================================\"",
              "echo \"✅ Deployment Complete!\"",
              "echo \"===========================================\"",
              "docker-compose -f docker-compose.prod.yml ps"
            ]' \
            --output text \
            --query 'Command.CommandId')
          
          echo "Command ID: $COMMAND_ID"
          echo "Waiting for command to complete..."
          
          # Wait for command to complete
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"
          
          # Get command output
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' \
            --output text

      - name: Health Check
        run: |
          echo "🏥 Running health check..."
          sleep 5
          response=$(curl -s -o /dev/null -w "%{http_code}" https://mushqila.com)
          if [ $response -eq 200 ] || [ $response -eq 302 ]; then
            echo "✅ Health check passed! Site is responding."
          else
            echo "❌ Health check failed! HTTP status: $response"
            exit 1
          fi

      - name: Notify Success
        if: success()
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "Site is live at https://mushqila.com"
