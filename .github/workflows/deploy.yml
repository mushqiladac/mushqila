name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            PROJECT_DIR="/home/ubuntu/mushqila"
            cd $PROJECT_DIR

            echo "=========================================="
            echo "🚀 Deployment Starting..."
            echo "=========================================="

            # Step 1: Pull latest code
            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            echo "✅ Code updated"

            # Step 2: Stop old containers
            echo "🛑 Stopping old containers..."
            docker-compose -f docker-compose.prod.yml down
            echo "✅ Containers stopped"

            # Step 3: Clean old Docker images and cache
            echo "🧹 Cleaning old Docker data..."
            docker system prune -af --volumes 2>/dev/null || true
            echo "✅ Docker cleaned"

            # Step 4: Build fresh image
            echo "🐳 Building fresh Docker image..."
            docker-compose -f docker-compose.prod.yml build --no-cache
            echo "✅ Image built"

            # Step 5: Start containers
            echo "🚀 Starting containers..."
            docker-compose -f docker-compose.prod.yml up -d
            echo "✅ Containers started"

            # Step 6: Wait for startup
            echo "⏳ Waiting for app to start..."
            sleep 20

            # Step 7: Run migrations
            echo "📊 Running migrations..."
            docker-compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput
            echo "✅ Migrations done"

            # Step 8: Collect static files
            echo "📁 Collecting static files..."
            docker-compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput --clear
            echo "✅ Static files collected"

            # Step 9: Final status
            echo ""
            echo "=========================================="
            echo "✅ Deployment Complete!"
            echo "=========================================="
            docker-compose -f docker-compose.prod.yml ps

      - name: Health Check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://mushqila.com/accounts/login/)
          echo "Login page status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
            echo "✅ Site is live!"
          else
            echo "❌ Health check failed: HTTP $STATUS"
            exit 1
          fi
