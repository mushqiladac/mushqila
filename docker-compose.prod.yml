
services:
  web:
    build: .
    container_name: mushqila_web
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env.docker
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    restart: unless-stopped
    depends_on:
      - redis
      - db
    networks:
      - mushqila_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: mushqila_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - mushqila_network

  db:
    image: postgres:13
    container_name: mushqila_db
    environment:
      POSTGRES_DB: mushqila
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - mushqila_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  celery:
    build: .
    container_name: mushqila_celery
    command: celery -A config worker -l info
    env_file:
      - .env.docker
    depends_on:
      - redis
      - web
    restart: unless-stopped
    networks:
      - mushqila_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  celery-beat:
    build: .
    container_name: mushqila_celery_beat
    command: celery -A config beat -l info
    env_file:
      - .env.docker
    depends_on:
      - redis
      - web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - mushqila_network

volumes:
  static_volume:
  media_volume:
  postgres_data:

networks:
  mushqila_network:
    driver: bridge