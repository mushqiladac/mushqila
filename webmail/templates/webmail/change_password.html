{% extends 'webmail/base.html' %}

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="content-card">
            <div class="d-flex align-items-center mb-4">
                <div style="width:45px;height:45px;border-radius:10px;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;margin-right:15px;">
                    <i class="fas fa-lock text-white fs-5"></i>
                </div>
                <div>
                    <h5 class="mb-0 fw-bold">Change Password</h5>
                    <small class="text-muted">Update your account password</small>
                </div>
            </div>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Current Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" name="current_password" class="form-control" placeholder="Enter current password" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">New Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-key text-muted"></i></span>
                        <input type="password" name="new_password" id="new_password" class="form-control" placeholder="Enter new password (min 8 chars)" required minlength="8">
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('new_password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirm New Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-key text-muted"></i></span>
                        <input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="Confirm new password" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirm_password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div id="password-match-msg" class="form-text mt-1"></div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-compose px-4">
                        <i class="fas fa-save me-2"></i>Change Password
                    </button>
                    <a href="{% url 'webmail:inbox' %}" class="btn btn-outline-secondary px-4">
                        <i class="fas fa-times me-2"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword(fieldId, btn) {
    const field = document.getElementById(fieldId);
    const icon = btn.querySelector('i');
    if (field.type === 'password') {
        field.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        field.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}

// Live password match check
document.getElementById('confirm_password').addEventListener('input', function() {
    const newPass = document.getElementById('new_password').value;
    const msg = document.getElementById('password-match-msg');
    if (this.value && this.value !== newPass) {
        msg.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>Passwords do not match</span>';
    } else if (this.value && this.value === newPass) {
        msg.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>Passwords match</span>';
    } else {
        msg.innerHTML = '';
    }
});
</script>
{% endblock %}
